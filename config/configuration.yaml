default_config:

homeassistant:
  debug: true

logger:
  default: info
  logs:
    custom_components.power_load_balancer: debug
    tuya: critical

input_number:
  appliance_1_power:
    name: "Dishwasher Power"
    initial: 0.0
    min: 0.0
    max: 3000.0
    step: 10.0
    unit_of_measurement: W
    icon: mdi:dishwasher

  appliance_2_power:
    name: "Washing Machine Power"
    initial: 0.0
    min: 0.0
    max: 2500.0
    step: 10.0
    unit_of_measurement: W
    icon: mdi:washing-machine

  appliance_3_power:
    name: "Radiator Power"
    initial: 0.0
    min: 0.0
    max: 2000.0
    step: 10.0
    unit_of_measurement: W
    icon: mdi:radiator

  additional_house_power:
    name: "Other House Loads"
    initial: 0.0
    min: 0.0
    max: 10000.0
    step: 10.0
    unit_of_measurement: W
    icon: mdi:home-plus

  hvac_power:
    name: "HVAC Power"
    initial: 0.0
    min: 0.0
    max: 5000.0
    step: 10.0
    unit_of_measurement: W
    icon: mdi:air-conditioner

  hvac_target_temperature:
    name: "HVAC Target Temperature"
    initial: 21.0
    min: 16.0
    max: 30.0
    step: 0.5
    unit_of_measurement: C
    icon: mdi:thermometer

  hvac_current_temperature:
    name: "HVAC Current Temperature"
    initial: 20.0
    min: -10.0
    max: 50.0
    step: 0.1
    unit_of_measurement: C
    icon: mdi:thermometer-lines

  media_player_power:
    name: "Media Player Power"
    initial: 0.0
    min: 0.0
    max: 500.0
    step: 10.0
    unit_of_measurement: W
    icon: mdi:speaker

input_boolean:
  appliance_1_switch:
    name: "Dishwasher"
    icon: mdi:dishwasher

  appliance_2_switch:
    name: "Washing Machine"
    icon: mdi:washing-machine

  appliance_3_switch:
    name: "Radiator"
    icon: mdi:radiator

  hvac_switch:
    name: "HVAC"
    icon: mdi:air-conditioner

  media_player_switch:
    name: "Media Player"
    icon: mdi:speaker

input_select:
  hvac_mode:
    name: "HVAC Mode"
    options:
      - "off"
      - "heat"
      - "cool"
      - "auto"
    initial: "off"
    icon: mdi:hvac

template:
  - sensor:
      - name: "Dishwasher Power"
        unique_id: "appliance_1_power_sensor"
        state: >-
          {% if is_state('input_boolean.appliance_1_switch', 'on') %}
            {{ states('input_number.appliance_1_power') | float(0) }}
          {% else %} 0 {% endif %}
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        icon: "mdi:flash"

      - name: "Washing Machine Power"
        unique_id: "appliance_2_power_sensor"
        state: >-
          {% if is_state('input_boolean.appliance_2_switch', 'on') %}
            {{ states('input_number.appliance_2_power') | float(0) }}
          {% else %} 0 {% endif %}
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        icon: "mdi:flash"

      - name: "Radiator Power"
        unique_id: "appliance_3_power_sensor"
        state: >-
          {% if is_state('input_boolean.appliance_3_switch', 'on') %}
            {{ states('input_number.appliance_3_power') | float(0) }}
          {% else %} 0 {% endif %}
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        icon: "mdi:flash"

      - name: "Total House Power"
        unique_id: "total_house_power_main"
        state: >-
          {% set base = (
            (states('sensor.appliance_1_power_sensor') | float(0)) +
            (states('sensor.appliance_2_power_sensor') | float(0)) +
            (states('sensor.appliance_3_power_sensor') | float(0)) +
            (states('input_number.additional_house_power') | float(0))
          ) %}
          {% set others = expand(states.sensor)
            | selectattr('attributes.device_class', 'defined')
            | selectattr('attributes.device_class', 'equalto', 'power')
            | rejectattr('entity_id', 'in', [
                'sensor.appliance_1_power_sensor',
                'sensor.appliance_2_power_sensor',
                'sensor.appliance_3_power_sensor',
                'sensor.potenza_totale_casa',
                'sensor.total_house_power_main'
              ])
            | map(attribute='state')
            | map('float', 0)
            | sum %}
          {{ base + others }}
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        icon: "mdi:home-lightning-bolt"

      - name: "HVAC Power"
        unique_id: "hvac_power_sensor"
        state: >-
          {% if not is_state('input_select.hvac_mode', 'off') %}
            {{ states('input_number.hvac_power') | float(0) }}
          {% else %} 0 {% endif %}
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        icon: "mdi:air-conditioner"

      - name: "Media Player Power"
        unique_id: "media_player_power_sensor"
        state: >-
          {% if is_state('input_boolean.media_player_switch', 'on') %}
            {{ states('input_number.media_player_power') | float(0) }}
          {% else %} 0 {% endif %}
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        icon: "mdi:speaker"

  - switch:
      - default_entity_id: switch.appliance_1
        name: "Dishwasher"
        state: "{{ is_state('input_boolean.appliance_1_switch', 'on') }}"
        icon: "mdi:dishwasher"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.appliance_1_switch
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.appliance_1_switch

      - default_entity_id: switch.appliance_2
        name: "Washing Machine"
        state: "{{ is_state('input_boolean.appliance_2_switch', 'on') }}"
        icon: "mdi:washing-machine"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.appliance_2_switch
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.appliance_2_switch

      - default_entity_id: switch.appliance_3
        name: "Radiator"
        state: "{{ is_state('input_boolean.appliance_3_switch', 'on') }}"
        icon: "mdi:radiator"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.appliance_3_switch
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.appliance_3_switch

      - default_entity_id: switch.media_player
        name: "Media Player"
        state: "{{ is_state('input_boolean.media_player_switch', 'on') }}"
        icon: "mdi:speaker"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.media_player_switch
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.media_player_switch

climate:
  - platform: climate_template
    name: "Test HVAC Climate"
    unique_id: "test_hvac_climate"
    modes:
      - "off"
      - "heat"
      - "cool"
      - "auto"
    min_temp: 16
    max_temp: 30
    temp_step: 0.5
    current_temperature_template: "{{ states('input_number.hvac_current_temperature') }}"
    target_temperature_template: "{{ states('input_number.hvac_target_temperature') }}"
    hvac_mode_template: "{{ states('input_select.hvac_mode') }}"
    set_temperature:
      - service: input_number.set_value
        target:
          entity_id: input_number.hvac_target_temperature
        data:
          value: "{{ temperature }}"
    set_hvac_mode:
      - service: input_select.select_option
        target:
          entity_id: input_select.hvac_mode
        data:
          option: "{{ hvac_mode }}"
      - service: "input_boolean.turn_{{ 'off' if hvac_mode == 'off' else 'on' }}"
        target:
          entity_id: input_boolean.hvac_switch

media_player:
  - platform: universal
    name: Test Media Player
    unique_id: test_media_player
    device_class: speaker
    commands:
      turn_on:
        action: input_boolean.turn_on
        target:
          entity_id: input_boolean.media_player_switch
      turn_off:
        action: input_boolean.turn_off
        target:
          entity_id: input_boolean.media_player_switch
    attributes:
      state: input_boolean.media_player_switch
